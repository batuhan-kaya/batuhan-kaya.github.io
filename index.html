 <style>
   @font-face {
  font-family: "OpificioNeue";
  src: url("/font/OpificioNeue.woff2") format("woff2"), url("/font/OpificioNeue.woff") format("woff");
  font-weight: 400;
  font-style: normal;
}
* {
  margin: 0px;
  padding: 0px;
  box-sizing: border-box;
}
body {
  background-image: radial-gradient(
      circle at 16% 83%,
      rgba(148, 148, 148, 0.06) 0%,
      rgba(148, 148, 148, 0.06) 50%,
      rgba(63, 63, 63, 0.06) 50%,
      rgba(63, 63, 63, 0.06) 100%
    ),
    radial-gradient(
      circle at 68% 87%,
      rgba(66, 66, 66, 0.06) 0%,
      rgba(66, 66, 66, 0.06) 50%,
      rgba(105, 105, 105, 0.06) 50%,
      rgba(105, 105, 105, 0.06) 100%
    ),
    radial-gradient(
      circle at 38% 50%,
      rgba(123, 123, 123, 0.06) 0%,
      rgba(123, 123, 123, 0.06) 50%,
      rgba(172, 172, 172, 0.06) 50%,
      rgba(172, 172, 172, 0.06) 100%
    ),
    linear-gradient(90deg, hsl(18, 0%, 1%), hsl(18, 0%, 1%));
  background-attachment: fixed;
  background-position: center;
  background-size: cover;
  width: 100%;
  height: 100%;
}
#navbar {
  display: flex;
  justify-content: flex-end;
}
#navbar ul {
  list-style-type: none;
  display: flex;
  align-items: center;
  padding-top: 20px;
}
#navbar ul li {
  padding: 0.75rem;
}
#navbar ul li a {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
  text-decoration: none;
  color: #fff;
  font-size: 30px;
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
  margin: 0px;
  padding: 0px;
}
#navbar ul li a:hover {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
  color: #fa862d;
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
}

.mainChild {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 20px 0px;
}
.mainChild figure img {
  width: 15vw;
  border-radius: 50%;
}
.mainChild p {
  color: whitesmoke;
  font-family: "OpificioNeue";
  padding: 0px 50px;
  font-size: 1.5rem;
}
.skills {
  margin: 0;
  padding: 0;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
}

.tab {
  display: grid;
  grid-template-columns: repeat(1, 160px);
  grid-gap: 100px;
  margin: auto 0;
}

@media (min-width: 420px) and (max-width: 659px) {
  .tab {
    grid-template-columns: repeat(2, 160px);
  }
}

@media (min-width: 660px) and (max-width: 1079px) {
  .tab {
    grid-template-columns: repeat(2, 160px);
  }
}

@media (min-width: 1080px) {
  .tab {
    grid-template-columns: repeat(4, 160px);
  }
}

.tab .box {
  width: 100%;
}

.tab .box p {
  margin-top: 15px;
  font-size: 24px;
  display: block;
  text-align: center;
  color: #fff;
}

.tab .box .chart {
  position: relative;
  width: 100%;
  height: 100%;
  text-align: center;
  font-size: 30px;
  line-height: 160px;
  height: 160px;
  color: #fff;
}

.tab .box canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
}
footer {
  min-height: 150px;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 45px;
  margin: 40px 0px 10px 0px;
}
.icon {
  background-repeat: no-repeat;
  background-size: contain;
  width: 40px;
  height: 40px;
  filter: grayscale(100%);
}
.icon:hover {
  filter: grayscale(0%);
}

@media only screen and (max-width: 1080px) {
  #navbar {
    display: flex;
    justify-content: center;
    margin: 10px 0px;
  }
  #navbar ul {
    list-style-type: none;
    display: flex;
    align-items: center;
    margin: 0px;
    padding: 0px;
  }
  .mainChild {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .mainChild figure img {
    width: 35vw;
    border-radius: 50%;
  }
  .mainChild p {
    color: whitesmoke;
    font-family: "OpificioNeue";
    font-size: 1rem;
    text-align: center;
  }
}
 </style>
